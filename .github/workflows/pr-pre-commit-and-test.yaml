name: PR Pre-commit and Test

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      UV_VENV_SEED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "setup.py"
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Install Python dependencies
        run: uv pip install -e ".[dev]"

      - name: Run pre-commit
        run: uv run pre-commit run --show-diff-on-failure --color=always --all-files

  test:
    needs: [pre-commit]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      UV_VENV_SEED: "true"
      MUJOCO_GL: osmesa
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "setup.py"
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libgl1-mesa-dev \
            libosmesa6-dev \
            libxml2-utils \
            xauth \
            xvfb

      - name: Install Python dependencies
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          xvfb-run -a -s "-screen 0 1280x1024x24 -ac" \
            uv run pytest tests/ \
            -s \
            -v \
            --log-cli-level=INFO
