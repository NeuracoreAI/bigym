name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bigym:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-utils \
            xvfb \
            xauth \
            libgl1-mesa-dev \
            libgl1-mesa-glx \
            libosmesa6-dev
          uv sync --extra dev
      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files
      - name: Run tests
        env:
          MUJOCO_GL: osmesa
        run: |
          xvfb-run -a -s "-screen 0 1280x1024x24 -ac" \
            uv run pytest tests/ \
            -s \
            -v \
            --log-cli-level=INFO
      - name: Build and check package
        run: |
          uv build
          uvx twine check dist/*
